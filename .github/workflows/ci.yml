name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bookstore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Wait for PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

          until pg_isready -h localhost -p 5432 -U postgres
          do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Install Util
        run: |
          cd Util
          mvn clean install -DskipTests

      - name: Install Service Library
        run: |
          cd service-library
          mvn clean install -DskipTests

      - name: Run User Service Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/bookstore
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          EUREKA_CLIENT_ENABLED: false
          EUREKA_CLIENT_REGISTER_WITH_EUREKA: false
          EUREKA_CLIENT_FETCH_REGISTRY: false
        run: |
          cd user-service
          mvn test

      - name: Run Book Service Tests
        env:
          EUREKA_CLIENT_ENABLED: false
        run: |
          cd book-service
          mvn test

      - name: Run Order Service Tests
        env:
          EUREKA_CLIENT_ENABLED: false
        run: |
          cd order-service
          mvn test

      - name: Run Payment Service Tests
        env:
          EUREKA_CLIENT_ENABLED: false
        run: |
          cd payment-service
          mvn test

      - name: Run Notification Service Tests
        env:
          EUREKA_CLIENT_ENABLED: false
        run: |
          cd notification-service
          mvn test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Package Discovery Service
        run: |
          cd discovery-service
          mvn clean package -DskipTests

      - name: Build Discovery Service Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/discovery-service:latest ./discovery-service

      - name: Push Discovery Service Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/discovery-service:latest

      - name: Package API Gateway
        run: |
          cd api-gateaway
          mvn clean package -DskipTests

      - name: Build API Gateway Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateaway:latest ./api-gateaway

      - name: Push API Gateway Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateaway:latest

      - name: Package User Service
        run: |
          cd user-service
          mvn clean package -DskipTests

      - name: Build User Service Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/user-service:latest ./user-service

      - name: Push User Service Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/user-service:latest

      - name: Package Book Service
        run: |
          cd book-service
          mvn clean package -DskipTests

      - name: Build Book Service Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/book-service:latest ./book-service

      - name: Push Book Service Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/book-service:latest

      - name: Package Order Service
        run: |
          cd order-service
          mvn clean package -DskipTests

      - name: Build Order Service Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:latest ./order-service

      - name: Push Order Service Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:latest

      - name: Package Payment Service
        run: |
          cd payment-service
          mvn clean package -DskipTests

      - name: Build Payment Service Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/payment-service:latest ./payment-service

      - name: Push Payment Service Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/payment-service:latest

      - name: Package Notification Service
        run: |
          cd notification-service
          mvn clean package -DskipTests

      - name: Build Notification Service Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:latest ./notification-service

      - name: Push Notification Service Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest
