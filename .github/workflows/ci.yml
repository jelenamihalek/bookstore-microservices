name: Build and Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Util
        run: |
          cd Util
          mvn clean install -DskipTests

      - name: Check Util Jar
        run: |
          jar tf ~/.m2/repository/com/bookstore/Util/0.0.1-SNAPSHOT/Util-0.0.1-SNAPSHOT.jar

      - name: Install Service Library
        run: |
          cd service-library
          mvn clean install -DskipTests

      - name: Run User Service Tests
        run: |
          cd user-service
          mvn test

      - name: Show Util Sources
        run: |
          find Util/src/main/java -type f
